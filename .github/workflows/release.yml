name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libx11-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libxi-dev libgl-dev

      - name: Build release binary
        run: cargo build --release

      - name: Package archive
        run: tar czf nanoimg-linux-x86_64.tar.gz -C target/release nanoimg

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nanoimg-linux-x86_64.tar.gz
